<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:16px 22px;display:flex;flex-direction:column;gap:11px;}
  .r{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:9px;}
  .r:last-child{border:0;}
  .samp{color:var(--fg);}
  .meta{margin-left:auto;font:var(--t-readout);color:var(--fg-dim);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="r"><div class="samp" style="font:700 16px/1 var(--font-sans);letter-spacing:.06em;color:var(--accent)">STRATA</div><div class="meta">wordmark · 16 / 700</div></div>
  <div class="r"><div class="samp" style="font:700 13px/1 var(--font-sans)">3</div><div class="meta">tab number · 13 / 700</div></div>
  <div class="r"><div class="samp" style="font:700 11px/1 var(--font-sans);letter-spacing:.04em">BYPASS</div><div class="meta">label / button · 11 / 700 caps</div></div>
  <div class="r"><div class="samp" style="font:400 13px/1 var(--font-sans)">Kick In</div><div class="meta">channel name · 13 / 400</div></div>
  <div class="r"><div class="samp" style="font:400 10px/1 var(--font-num);font-variant-numeric:tabular-nums">-20 -7 -3 0 +3</div><div class="meta">VU scale · 10 / 400 tabular</div></div>
  <div class="r"><div class="samp" style="font:400 9px/1 var(--font-num);font-variant-numeric:tabular-nums">-12.4 dB&nbsp;&nbsp;0VU=-24</div><div class="meta">readout · 9 / 400 tabular</div></div>
</div>
</body>
</html>
