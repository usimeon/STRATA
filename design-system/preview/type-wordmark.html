<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:26px 24px;display:flex;align-items:center;gap:18px;}
  .mark{font:700 44px/1 var(--font-sans);color:var(--accent);letter-spacing:.06em;}
  .dot{width:14px;height:14px;border-radius:50%;background:var(--bucket-1);}
  .spec{margin-left:auto;text-align:right;}
  .spec div{font:var(--t-readout);color:var(--fg-dim);line-height:1.6;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">STRATA</div>
  <div class="dot" title="active group dot"></div>
  <div class="spec">
    <div>Inter Bold · letter-spacing 0.06em</div>
    <div>accent teal #36C1A6 on bg #14171C</div>
    <div>16px in-plugin · typographic, no logomark</div>
  </div>
</div>
</body>
</html>
