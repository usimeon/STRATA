<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
  .b{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .dot{width:100%;aspect-ratio:1;border-radius:50%;max-width:48px;border:2px solid rgba(255,255,255,.06);}
  .n{font:var(--t-readout);color:var(--fg-dim);}
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="b"><div class="dot" style="background:var(--bucket-0)"></div><div class="n">none</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-1)"></div><div class="n">1</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-2)"></div><div class="n">2</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-3)"></div><div class="n">3</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-4)"></div><div class="n">4</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-5)"></div><div class="n">5</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-6)"></div><div class="n">6</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-7)"></div><div class="n">7</div></div>
    <div class="b"><div class="dot" style="background:var(--bucket-8)"></div><div class="n">8</div></div>
  </div>
</div>
</body>
</html>
