<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STRATA — Plugin UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #090b0e;
    font-family: 'Inter', sans-serif;
    color: #e7ecf2;
  }
  #root {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  /* Remove default input/button chrome */
  input, button { font-family: inherit; box-sizing: border-box; }
  button { appearance: none; -webkit-appearance: none; }
  input:focus { outline: 2px solid #36c1a6; outline-offset: 1px; }
  button:focus-visible { outline: 2px solid #36c1a6; outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Load components in dependency order: VuMeter → Knob → ChannelStrip → ChannelView → App -->
<script type="text/babel" src="VuMeter.jsx"></script>
<script type="text/babel" src="Knob.jsx"></script>
<script type="text/babel" src="ChannelStrip.jsx"></script>
<script type="text/babel" src="ChannelView.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState('strip');

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
      {view === 'strip' ? (
        <ChannelStrip onOpenChannelView={() => setView('channel')} />
      ) : (
        <ChannelView onClose={() => setView('strip')} selfId={1} />
      )}
      <div style={{ font:'400 10px/1 Inter, sans-serif', color:'#3a3f4a', letterSpacing:'.04em', textTransform:'uppercase' }}>
        STRATA UI Kit · usimeon/STRATA
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
